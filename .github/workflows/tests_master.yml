name: Test
permissions:
  contents: read
  pull-requests: read
on:
  push:
    branches:
      - master

jobs:
  golangci:
    name: Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
          args: --timeout=5m
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: install Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true
      - name: checkout code
        uses: actions/checkout@v7
      - name: golang tests
        env:
          GO111MODULE: on
          BCD_ENV: production
        run: |
          go mod download
          go test ./...
      - name: golang tests (indexer build tags)
        env:
          GO111MODULE: on
          BCD_ENV: production
        run: go test -tags=jsoniter_sloppy ./internal/noderpc/... ./internal/bcd/... ./internal/parsers/... ./cmd/indexer/...
